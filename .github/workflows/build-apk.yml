name: Android APK Build

# Позволяет запускать сборку вручную с помощью кнопки
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Скачиваем твой код в виртуальный компьютер GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Устанавливаем Java, чтобы работала сборка Android
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Даем разрешение на запуск файла gradlew (важно для Linux/Mac)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # А вот и та самая команда, которую ты хотел выполнить!
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # Сохраняем готовый APK-файл, чтобы ты мог его скачать
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
