# Имя рабочего процесса (будет видно на вкладке Actions)
name: Build Debug APK

# Условия запуска: разрешаем запуск вручную с кнопки
on:
  workflow_dispatch:

# Сама работа (job)
jobs:
  build:
    # Запускаем на последней версии Ubuntu (там есть всё необходимое) [citation:2]
    runs-on: ubuntu-latest

    steps:
      # 1. Копируем код проекта из репозитория на виртуальный сервер
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Устанавливаем Java (нужна для сборки Android)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17' # Версия Java, рекомендуемая для современных проектов [citation:5]
          distribution: 'temurin'

      # 3. Даем права на выполнение gradlew (важно для Linux-систем)
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 4. САМА СБОРКА! Запускаем команду для создания debug APK [citation:1][citation:3][citation:5]
      - name: Build APK
        run: ./gradlew assembleDebug

      # 5. Загружаем готовый APK-файл в интерфейс GitHub [citation:5]
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          # Имя папки, в которую сохранится результат на странице Actions
          name: app-debug-apk
          # Путь к папке, где Gradle обычно собирает APK
          path: app/build/outputs/apk/debug/
