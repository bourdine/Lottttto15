name: Android APK Build

# Запуск при пуше в main/master или вручную
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:  # позволяет запускать вручную из интерфейса GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Устанавливаем JDK (необходим для сборки Android)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Даём права на выполнение gradlew (для Linux)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Собираем Debug-версию APK
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # 5. Загружаем готовый APK как артефакт сборки
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
